category: "linked-list"

problems:
  - id: "linked-list-001"
    title: "Reverse Linked List"
    difficulty: "easy"
    prompt: |
      Given the head of a singly linked list, reverse the list and
      return the reversed list.

      Constraints:
        - The number of nodes is in the range [0, 5000]
        - -5000 <= Node.val <= 5000

      Example 1:
        Input: head = [1, 2, 3, 4, 5]
        Output: [5, 4, 3, 2, 1]

      Example 2:
        Input: head = [1, 2]
        Output: [2, 1]

      Example 3:
        Input: head = []
        Output: []
    hints:
      - "You need to redirect each node's next pointer to its previous node."
      - "Track three pointers: prev, current, and next."
    solution_outline: |
      Iterate through the list maintaining prev, curr, and next_node.
      At each step: save next_node = curr.next, reverse the pointer
      curr.next = prev, advance prev = curr, curr = next_node. Return
      prev when curr is null.
      Time: O(n). Space: O(1).
    tags: ["linked-list", "iteration"]
    neetcode_id: "neetcode-035"
    challenge_type: "explain_why"

  - id: "linked-list-002"
    title: "Merge Two Sorted Lists"
    difficulty: "easy"
    prompt: |
      You are given the heads of two sorted linked lists list1 and
      list2. Merge the two lists into one sorted list by splicing
      together the nodes of the two lists. Return the head of the
      merged list.

      Constraints:
        - The number of nodes in both lists is in the range [0, 50]
        - -100 <= Node.val <= 100
        - Both lists are sorted in non-decreasing order

      Example:
        Input: list1 = [1, 2, 4], list2 = [1, 3, 4]
        Output: [1, 1, 2, 3, 4, 4]
    hints:
      - "Use a dummy head node to simplify edge cases."
      - "Compare the current nodes of both lists and append the smaller one."
    solution_outline: |
      Create a dummy node. Maintain a tail pointer. Compare the heads
      of both lists, append the smaller node to tail, and advance that
      list's pointer. When one list is exhausted, append the remainder
      of the other. Return dummy.next.
      Time: O(n + m). Space: O(1).
    tags: ["linked-list", "two-pointers"]
    neetcode_id: "neetcode-036"
    challenge_type: "explain_why"

  - id: "linked-list-003"
    title: "Reorder List"
    difficulty: "medium"
    prompt: |
      You are given the head of a singly linked list:
        L0 -> L1 -> ... -> Ln-1 -> Ln

      Reorder it to:
        L0 -> Ln -> L1 -> Ln-1 -> L2 -> Ln-2 -> ...

      You may not modify the values in the nodes. Only nodes themselves
      may be changed.

      Constraints:
        - The number of nodes is in the range [1, 5 * 10^4]
        - 1 <= Node.val <= 1000

      Example 1:
        Input: head = [1, 2, 3, 4]
        Output: [1, 4, 2, 3]

      Example 2:
        Input: head = [1, 2, 3, 4, 5]
        Output: [1, 5, 2, 4, 3]
    hints:
      - "Find the middle of the list, then reverse the second half."
      - "Use the slow/fast pointer technique to find the middle."
      - "Merge the first half and the reversed second half by alternating nodes."
    solution_outline: |
      Three steps: (1) Find the middle using slow/fast pointers.
      (2) Reverse the second half of the list. (3) Merge the two
      halves by alternating nodes from each.
      Time: O(n). Space: O(1).
    tags: ["linked-list", "two-pointers"]
    neetcode_id: "neetcode-037"
    challenge_type: "explain_why"

  - id: "linked-list-004"
    title: "Remove Nth Node From End of List"
    difficulty: "medium"
    prompt: |
      Given the head of a linked list, remove the nth node from the end
      of the list and return its head.

      Constraints:
        - The number of nodes is sz
        - 1 <= sz <= 30
        - 0 <= Node.val <= 100
        - 1 <= n <= sz

      Example 1:
        Input: head = [1, 2, 3, 4, 5], n = 2
        Output: [1, 2, 3, 5]

      Example 2:
        Input: head = [1], n = 1
        Output: []
    hints:
      - "Use two pointers separated by n nodes."
      - "When the first pointer reaches the end, the second pointer is at the node before the target."
      - "A dummy node before head simplifies removing the first node."
    solution_outline: |
      Use a dummy node pointing to head. Advance the first pointer n+1
      steps ahead. Then advance both pointers until the first reaches
      null. The second pointer is now just before the target node.
      Set second.next = second.next.next to remove the target.
      Time: O(n). Space: O(1).
    tags: ["linked-list", "two-pointers"]
    neetcode_id: "neetcode-038"
    challenge_type: "explain_why"

  - id: "linked-list-005"
    title: "Copy List With Random Pointer"
    difficulty: "medium"
    prompt: |
      A linked list of length n is given where each node contains an
      additional random pointer which could point to any node in the
      list or null.

      Construct a deep copy of the list. Each node in the copy should
      have its value set to the value of its corresponding original
      node. Both the next and random pointers of the new nodes should
      point to new nodes in the copied list with the same relative
      structure.

      Return the head of the copied linked list.

      Constraints:
        - 0 <= n <= 1000
        - -10^4 <= Node.val <= 10^4
        - Node.random is null or points to a node in the list

      Example:
        Input: head = [[7,null],[13,0],[11,4],[10,2],[1,0]]
        Output: [[7,null],[13,0],[11,4],[10,2],[1,0]]
    hints:
      - "You need a mapping from original nodes to their copies."
      - "A hash map from old node to new node lets you wire up next and random pointers."
      - "An O(1) space alternative interleaves copy nodes within the original list."
    solution_outline: |
      First pass: create a hash map from each original node to a new
      copy node. Second pass: for each original node, set copy.next and
      copy.random using the map. Return the copy of head.
      Time: O(n). Space: O(n).
    tags: ["linked-list", "hash-map"]
    neetcode_id: "neetcode-039"
    challenge_type: "explain_why"

  - id: "linked-list-006"
    title: "Add Two Numbers"
    difficulty: "medium"
    prompt: |
      You are given two non-empty linked lists representing two
      non-negative integers. The digits are stored in reverse order,
      and each node contains a single digit. Add the two numbers and
      return the sum as a linked list.

      You may assume the two numbers do not contain any leading zero,
      except the number 0 itself.

      Constraints:
        - The number of nodes in each list is in the range [1, 100]
        - 0 <= Node.val <= 9
        - The list represents a number without leading zeros

      Example:
        Input: l1 = [2, 4, 3], l2 = [5, 6, 4]
        Output: [7, 0, 8]
        Explanation: 342 + 465 = 807
    hints:
      - "Traverse both lists simultaneously, adding corresponding digits."
      - "Keep track of the carry from each addition."
      - "Do not forget to add a final node if there is a remaining carry."
    solution_outline: |
      Traverse both lists in tandem. At each step, compute sum = val1
      + val2 + carry. Create a new node with sum % 10 and update
      carry = sum // 10. Continue until both lists are exhausted and
      carry is zero.
      Time: O(max(m, n)). Space: O(max(m, n)).
    tags: ["linked-list", "math"]
    neetcode_id: "neetcode-040"
    challenge_type: "explain_why"

  - id: "linked-list-007"
    title: "Linked List Cycle"
    difficulty: "easy"
    prompt: |
      Given head, the head of a linked list, determine if the linked
      list has a cycle in it. There is a cycle if some node in the list
      can be reached again by continuously following the next pointer.

      Return true if there is a cycle, false otherwise.

      Constraints:
        - The number of nodes is in the range [0, 10^4]
        - -10^5 <= Node.val <= 10^5
        - pos is -1 or a valid index in the linked list

      Example 1:
        Input: head = [3, 2, 0, -4], pos = 1
        Output: true
        Explanation: There is a cycle where the tail connects to index 1.

      Example 2:
        Input: head = [1], pos = -1
        Output: false
    hints:
      - "Can you detect a cycle without using extra memory?"
      - "Use two pointers moving at different speeds (Floyd's algorithm)."
    solution_outline: |
      Floyd's cycle detection: use a slow pointer (one step) and a fast
      pointer (two steps). If they ever meet, a cycle exists. If fast
      reaches null, there is no cycle.
      Time: O(n). Space: O(1).
    tags: ["linked-list", "two-pointers", "floyd"]
    neetcode_id: "neetcode-041"
    challenge_type: "explain_why"

  - id: "linked-list-008"
    title: "Find the Duplicate Number"
    difficulty: "medium"
    prompt: |
      Given an array of integers nums containing n + 1 integers where
      each integer is in the range [1, n] inclusive, there is exactly
      one repeated number. Find and return it.

      You must solve it without modifying the array and using only
      constant extra space.

      Constraints:
        - 1 <= n <= 10^5
        - nums.length == n + 1
        - 1 <= nums[i] <= n
        - There is only one repeated number, but it could be repeated
          more than once

      Example 1:
        Input: nums = [1, 3, 4, 2, 2]
        Output: 2

      Example 2:
        Input: nums = [3, 1, 3, 4, 2]
        Output: 3
    hints:
      - "Think of the array as a linked list where nums[i] is the next pointer."
      - "The duplicate creates a cycle in this implicit linked list."
      - "Apply Floyd's cycle detection to find the cycle entrance."
    solution_outline: |
      Treat the array as an implicit linked list (index -> nums[index]).
      The duplicate number creates a cycle. Use Floyd's algorithm: phase
      1 finds the meeting point with slow/fast pointers. Phase 2 finds
      the cycle entrance by resetting one pointer to the start and
      advancing both one step at a time.
      Time: O(n). Space: O(1).
    tags: ["linked-list", "floyd", "arrays"]
    neetcode_id: "neetcode-042"
    challenge_type: "explain_why"

  - id: "linked-list-009"
    title: "LRU Cache"
    difficulty: "medium"
    prompt: |
      Design a data structure that follows the constraints of a Least
      Recently Used (LRU) cache.

      Implement the LRUCache class:
        - LRUCache(int capacity) initializes the cache with positive
          size capacity.
        - int get(int key) returns the value of the key if it exists,
          otherwise returns -1.
        - void put(int key, int value) updates the value of the key if
          it exists. Otherwise, adds the key-value pair. If the number
          of keys exceeds the capacity, evict the least recently used
          key.

      Both get and put must run in O(1) average time.

      Constraints:
        - 1 <= capacity <= 3000
        - 0 <= key <= 10^4
        - 0 <= value <= 10^5
        - At most 2 * 10^5 calls to get and put

      Example:
        LRUCache cache = new LRUCache(2);
        cache.put(1, 1);
        cache.put(2, 2);
        cache.get(1);    // returns 1
        cache.put(3, 3); // evicts key 2
        cache.get(2);    // returns -1
    hints:
      - "You need O(1) lookup and O(1) insertion/removal of the least recent item."
      - "A hash map gives O(1) lookup. A doubly linked list gives O(1) removal and insertion at ends."
      - "Combine both: hash map pointing to nodes in a doubly linked list."
    solution_outline: |
      Use a hash map (key to node) and a doubly linked list ordered by
      recency. On get: move the node to the head (most recent). On put:
      add or update at the head; if over capacity, remove the tail node
      (least recent) and delete it from the map.
      Time: O(1) per operation. Space: O(capacity).
    tags: ["linked-list", "hash-map", "design"]
    neetcode_id: "neetcode-043"
    challenge_type: "multiple_choice"

  - id: "linked-list-010"
    title: "Merge K Sorted Lists"
    difficulty: "hard"
    prompt: |
      You are given an array of k linked lists, each sorted in ascending
      order. Merge all the linked lists into one sorted linked list and
      return it.

      Constraints:
        - k == lists.length
        - 0 <= k <= 10^4
        - 0 <= lists[i].length <= 500
        - -10^4 <= lists[i][j] <= 10^4
        - lists[i] is sorted in ascending order
        - The sum of lists[i].length will not exceed 10^4

      Example:
        Input: lists = [[1,4,5],[1,3,4],[2,6]]
        Output: [1,1,2,3,4,4,5,6]
    hints:
      - "Comparing all k heads each time gives O(k*N). Can you do better?"
      - "A min-heap of size k lets you always extract the smallest head in O(log k)."
      - "Alternatively, merge lists pairwise like merge sort."
    solution_outline: |
      Use a min-heap holding the head node of each non-empty list.
      Repeatedly extract the minimum, append it to the result, and push
      that node's next into the heap (if it exists).
      Time: O(N log k) where N is total number of nodes. Space: O(k).
    tags: ["linked-list", "heap", "divide-and-conquer"]
    neetcode_id: "neetcode-044"
    challenge_type: "multiple_choice"

  - id: "linked-list-011"
    title: "Reverse Nodes in K-Group"
    difficulty: "hard"
    prompt: |
      Given the head of a linked list, reverse the nodes of the list k
      at a time and return the modified list. k is a positive integer
      that is less than or equal to the length of the list. If the
      number of nodes is not a multiple of k, the remaining nodes at the
      end should stay in their original order.

      You may not alter the values in the nodes. Only nodes themselves
      may be changed.

      Constraints:
        - The number of nodes is n
        - 1 <= k <= n <= 5000
        - 0 <= Node.val <= 1000

      Example 1:
        Input: head = [1, 2, 3, 4, 5], k = 2
        Output: [2, 1, 4, 3, 5]

      Example 2:
        Input: head = [1, 2, 3, 4, 5], k = 3
        Output: [3, 2, 1, 4, 5]
    hints:
      - "First, check if there are at least k nodes remaining."
      - "Reverse the next k nodes, then connect the reversed group to the rest."
      - "Use a dummy node and track the tail of the previously reversed group."
    solution_outline: |
      Use a dummy node before head. For each group of k nodes: check
      that k nodes remain (otherwise stop). Reverse those k nodes in
      place. Connect the previous group's tail to the new head, and
      the new tail to the next group. Advance and repeat.
      Time: O(n). Space: O(1).
    tags: ["linked-list", "recursion"]
    neetcode_id: "neetcode-045"
    challenge_type: "explain_why"
