category: "intervals"

problems:
  - id: "intervals-001"
    title: "Insert Interval"
    difficulty: "medium"
    prompt: |
      Given a sorted list of non-overlapping intervals and a new interval,
      insert the new interval and merge if necessary. Return the resulting
      list of non-overlapping intervals, still sorted by start time.

      Constraints: 0 <= intervals.length <= 10^4,
      intervals[i].length == 2, 0 <= start <= end <= 10^5

      Example: intervals = [[1,3],[6,9]], newInterval = [2,5]
      -> [[1,5],[6,9]]
    hints:
      - "Add all intervals that end before the new interval starts."
      - "Merge all overlapping intervals with the new interval, then add the remaining intervals."
    solution_outline: |
      Three-phase linear scan: (1) add intervals entirely before the new
      one, (2) merge overlapping intervals by extending the new interval's
      start/end, (3) add intervals entirely after. Time O(n), space O(n)
      for the output.
    tags: ["intervals", "array", "sorting"]
    neetcode_id: "neetcode-096"
    challenge_type: "explain_why"

  - id: "intervals-002"
    title: "Merge Intervals"
    difficulty: "medium"
    prompt: |
      Given an array of intervals where intervals[i] = [start, end],
      merge all overlapping intervals and return the list of
      non-overlapping intervals that cover all the input ranges.

      Constraints: 1 <= intervals.length <= 10^4,
      intervals[i].length == 2, 0 <= start <= end <= 10^4

      Example: intervals = [[1,3],[2,6],[8,10],[15,18]]
      -> [[1,6],[8,10],[15,18]]
    hints:
      - "Sort intervals by start time."
      - "Iterate and merge: if the current interval overlaps with the last merged interval, extend the end."
    solution_outline: |
      Sort by start time. Initialize the result with the first interval.
      For each subsequent interval, if it overlaps with the last result
      interval (start <= prev_end), merge by updating the end to
      max(prev_end, curr_end). Otherwise append as a new interval.
      Time O(n log n), space O(n).
    tags: ["intervals", "sorting"]
    neetcode_id: "neetcode-097"
    challenge_type: "explain_why"

  - id: "intervals-003"
    title: "Non-overlapping Intervals"
    difficulty: "medium"
    prompt: |
      Given an array of intervals, return the minimum number of intervals
      you need to remove to make the rest non-overlapping.

      Constraints: 1 <= intervals.length <= 10^5,
      intervals[i].length == 2, -5*10^4 <= start < end <= 5*10^4

      Example: intervals = [[1,2],[2,3],[3,4],[1,3]] -> 1
      (Remove [1,3] to make the rest non-overlapping.)
    hints:
      - "This is equivalent to finding the maximum number of non-overlapping intervals (activity selection)."
      - "Sort by end time and greedily select intervals that do not overlap with the previously selected one."
    solution_outline: |
      Sort by end time. Greedily select the interval with the earliest
      end that does not overlap the previous selection. Count the number
      not selected; that is the removal count. Equivalently:
      removals = total - max_non_overlapping. Time O(n log n), space O(1).
    tags: ["intervals", "greedy", "sorting"]
    neetcode_id: "neetcode-098"
    challenge_type: "explain_why"

  - id: "intervals-004"
    title: "Meeting Rooms"
    difficulty: "easy"
    prompt: |
      Given an array of meeting time intervals where
      intervals[i] = [start, end], determine if a person can attend all
      meetings (i.e., no two meetings overlap).

      Constraints: 0 <= intervals.length <= 10^4,
      0 <= start < end <= 10^6

      Example: intervals = [[0,30],[5,10],[15,20]] -> false
      Example: intervals = [[7,10],[2,4]] -> true
    hints:
      - "Sort intervals by start time."
      - "Check if any meeting starts before the previous one ends."
    solution_outline: |
      Sort by start time. Iterate and check if intervals[i].start <
      intervals[i-1].end for any consecutive pair. If so, return false.
      Time O(n log n), space O(1).
    tags: ["intervals", "sorting"]
    neetcode_id: "neetcode-099"
    challenge_type: "explain_why"

  - id: "intervals-005"
    title: "Meeting Rooms II"
    difficulty: "medium"
    prompt: |
      Given an array of meeting time intervals, find the minimum number
      of conference rooms required so that all meetings can be held.

      Constraints: 1 <= intervals.length <= 10^4,
      0 <= start < end <= 10^6

      Example: intervals = [[0,30],[5,10],[15,20]] -> 2
      Example: intervals = [[7,10],[2,4]] -> 1
    hints:
      - "Think about events: each meeting creates a +1 at its start and a -1 at its end."
      - "Alternatively, sort start times and end times separately. Use two pointers to simulate room allocation."
    solution_outline: |
      Separate start and end times into two sorted arrays. Use two
      pointers: if the next event is a start, allocate a room; if it is
      an end, free a room. Track the peak room count. Alternatively,
      use a min-heap of end times. Time O(n log n), space O(n).
    tags: ["intervals", "sorting", "heap", "two-pointers"]
    neetcode_id: "neetcode-100"
    challenge_type: "explain_why"

  - id: "intervals-006"
    title: "Minimum Interval to Include Each Query"
    difficulty: "hard"
    prompt: |
      Given a 2D array intervals where intervals[i] = [left, right] and
      an array queries, for each query q return the size of the smallest
      interval [left, right] such that left <= q <= right. If no interval
      contains q, return -1.

      Constraints: 1 <= intervals.length <= 10^5,
      1 <= queries.length <= 10^5, 1 <= left <= right <= 10^7,
      1 <= queries[j] <= 10^7

      Example: intervals = [[1,4],[2,4],[3,6],[4,4]], queries = [2,3,4,5]
      -> [3,3,1,4]
    hints:
      - "Sort intervals by start and queries by value. Process queries in order."
      - "Use a min-heap keyed by interval size. Add intervals whose start <= current query, and remove intervals whose end < current query."
    solution_outline: |
      Offline approach: sort queries by value and intervals by start.
      Use a min-heap of (interval_size, right_end). For each query, push
      all intervals with start <= query, then pop intervals with
      end < query. The heap top gives the smallest valid interval.
      Map results back to original query order.
      Time O((n + q) log n), space O(n + q).
    tags: ["intervals", "heap", "sorting", "sweep-line"]
    neetcode_id: "neetcode-101"
    challenge_type: "explain_why"
