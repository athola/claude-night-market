category: "advanced-graphs"

problems:
  - id: "advanced-graphs-001"
    title: "Reconstruct Itinerary"
    difficulty: "hard"
    prompt: |
      Given a list of airline tickets represented as pairs
      [from, to], reconstruct the itinerary in order. All
      tickets belong to a person departing from "JFK".
      The itinerary must use all tickets exactly once.

      If multiple valid itineraries exist, return the one
      with the smallest lexical order when read as a single
      string.

      Example:
        Input: tickets = [["MUC","LHR"],["JFK","MUC"],
                          ["SFO","SJC"],["LHR","SFO"]]
        Output: ["JFK","MUC","LHR","SFO","SJC"]

      Constraints:
        - 1 <= tickets.length <= 300
        - tickets[i] = [from_i, to_i]
        - from_i, to_i are 3 uppercase English letters
        - from_i != to_i
    hints:
      - "This is finding an Eulerian path starting from JFK."
      - "Sort destinations lexicographically and use Hierholzer's algorithm."
      - "Use a stack-based DFS; append to result when backtracking from a dead end."
    solution_outline: |
      Build adjacency list with sorted destinations (use a
      min-heap or sorted list). Hierholzer's algorithm: DFS
      from JFK, always visiting the smallest available
      destination. When stuck, prepend the current airport
      to the result. Reverse at the end.
      Time: O(E log E) for sorting. Space: O(E).
    tags: ["graph", "eulerian-path", "dfs"]
    neetcode_id: "neetcode-092"
    challenge_type: "explain_why"

  - id: "advanced-graphs-002"
    title: "Min Cost to Connect All Points"
    difficulty: "medium"
    prompt: |
      Given an array of points on a 2D plane, return the
      minimum cost to connect all points. The cost of
      connecting two points is their Manhattan distance:
      |xi - xj| + |yi - yj|. All points must be connected
      with exactly one simple path between any two points.

      Example:
        Input: points = [[0,0],[2,2],[3,10],[5,2],[7,0]]
        Output: 20

      Constraints:
        - 1 <= points.length <= 1000
        - -10^6 <= xi, yi <= 10^6
        - All points are distinct
    hints:
      - "This is a Minimum Spanning Tree (MST) problem."
      - "Prim's or Kruskal's algorithm both work."
      - "For dense graphs (all pairs connected), Prim's with a priority queue is efficient."
    solution_outline: |
      Prim's algorithm: start from any point, maintain a
      min-heap of (cost, point) for unvisited points.
      Greedily add the cheapest edge. Repeat until all
      points are connected.
      Time: O(n^2 log n) with a heap, or O(n^2) with
      an array-based Prim's. Space: O(n^2) for edges
      or O(n) for Prim's with lazy evaluation.
    tags: ["graph", "mst", "prims-algorithm"]
    neetcode_id: "neetcode-093"
    challenge_type: "explain_why"

  - id: "advanced-graphs-003"
    title: "Network Delay Time"
    difficulty: "medium"
    prompt: |
      Given a network of n nodes (1-indexed) and a list of
      directed weighted edges times[i] = [ui, vi, wi]
      (edge from ui to vi with travel time wi), and a
      source node k, return the minimum time for all nodes
      to receive a signal sent from k. Return -1 if not
      all nodes can be reached.

      Example:
        Input: times = [[2,1,1],[2,3,1],[3,4,1]],
               n = 4, k = 2
        Output: 2

      Constraints:
        - 1 <= n <= 100
        - 1 <= times.length <= 6000
        - times[i] = [ui, vi, wi]
        - 1 <= wi <= 100
    hints:
      - "This is single-source shortest path: Dijkstra's algorithm."
      - "The answer is the maximum shortest distance among all reachable nodes."
      - "If any node is unreachable, return -1."
    solution_outline: |
      Dijkstra's algorithm from node k. Use a min-heap of
      (distance, node). Process nodes in order of distance.
      After processing all reachable nodes, the answer is
      the maximum distance. If any node was not reached,
      return -1.
      Time: O(E log V), Space: O(V + E).
    tags: ["graph", "dijkstra", "shortest-path"]
    neetcode_id: "neetcode-094"
    challenge_type: "explain_why"

  - id: "advanced-graphs-004"
    title: "Swim in Rising Water"
    difficulty: "hard"
    prompt: |
      Given an n x n grid where grid[i][j] represents the
      elevation at cell (i, j), at time t you can swim to
      any adjacent cell if the elevation of both the current
      and destination cells is at most t. Starting at (0,0)
      at time 0, find the minimum time to reach (n-1, n-1).

      You can wait at any cell for time to pass.

      Example:
        Input: grid = [[0,2],[1,3]]
        Output: 3
        Explanation: at t=3, path (0,0)->(1,0)->(1,1) is
        valid since all elevations <= 3.

      Constraints:
        - n: [1, 50]
        - grid[i][j]: [0, n^2 - 1]
        - Each value from 0 to n^2 - 1 appears exactly once
    hints:
      - "The minimum time equals the maximum elevation on the optimal path."
      - "Use a modified Dijkstra: the cost of entering a cell is max(current_time, cell_elevation)."
      - "Binary search on time t combined with BFS/DFS is another approach."
    solution_outline: |
      Modified Dijkstra with min-heap of (max_elevation, r, c).
      Start at (0,0) with grid[0][0]. For each neighbor,
      the cost is max(current_cost, grid[nr][nc]). Process
      in order; when reaching (n-1,n-1), return the cost.
      Time: O(n^2 log n), Space: O(n^2).
    tags: ["graph", "dijkstra", "binary-search", "matrix"]
    neetcode_id: "neetcode-095"
    challenge_type: "explain_why"

  - id: "advanced-graphs-005"
    title: "Alien Dictionary"
    difficulty: "hard"
    prompt: |
      Given a sorted list of words from an alien language,
      derive the order of characters in that language. The
      words are sorted lexicographically by the alien
      language's rules.

      Return a string of the unique characters in the alien
      alphabet, ordered according to the alien language. If
      no valid ordering exists, return "". If multiple valid
      orderings exist, return any.

      Example:
        Input: words = ["wrt","wrf","er","ett","rftt"]
        Output: "wertf"

      Constraints:
        - 1 <= words.length <= 100
        - 1 <= words[i].length <= 100
        - Words contain only lowercase English letters
    hints:
      - "Compare adjacent words to extract ordering constraints between characters."
      - "Build a directed graph of character precedences and run topological sort."
      - "Watch for invalid input: if a longer word comes before its prefix, the ordering is invalid."
    solution_outline: |
      Compare each pair of adjacent words to find the first
      differing character, which gives a directed edge
      (char_a -> char_b). Build a graph and run topological
      sort (Kahn's algorithm). If a cycle is detected or a
      longer word precedes its prefix, return "".
      Time: O(C) where C is total characters across all
      words. Space: O(U + E) where U is unique characters.
    tags: ["graph", "topological-sort", "string"]
    neetcode_id: "neetcode-096"
    challenge_type: "explain_why"

  - id: "advanced-graphs-006"
    title: "Cheapest Flights Within K Stops"
    difficulty: "medium"
    prompt: |
      There are n cities connected by flights. Given an
      array flights where flights[i] = [from, to, price],
      find the cheapest price from city src to city dst
      with at most k stops. Return -1 if no such route
      exists.

      Example:
        Input: n = 4,
               flights = [[0,1,100],[1,2,100],[2,0,100],
                           [1,3,600],[2,3,200]],
               src = 0, dst = 3, k = 1
        Output: 700
        Explanation: 0 -> 1 -> 3 costs 700 with 1 stop.

      Constraints:
        - 1 <= n <= 100
        - 0 <= flights.length <= n*(n-1)/2
        - 0 <= src, dst, k < n
        - 1 <= price <= 10^4
    hints:
      - "Bellman-Ford with at most k+1 relaxation rounds works here."
      - "BFS with pruning or modified Dijkstra tracking stops also work."
      - "In Bellman-Ford, use a copy of distances to avoid propagating within the same round."
    solution_outline: |
      Bellman-Ford: initialize distances to infinity, src to 0.
      Run k+1 rounds of relaxation. In each round, use the
      previous round's distances (copy first) to update.
      After k+1 rounds, dist[dst] is the answer.
      Time: O(k * E), Space: O(n).
    tags: ["graph", "bellman-ford", "shortest-path", "dynamic-programming"]
    neetcode_id: "neetcode-097"
    challenge_type: "explain_why"
